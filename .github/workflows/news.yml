name: Daily CNP news fallback

on:
  schedule:
    # 07:00 JST = 22:00 UTC.
    # Mac local job runs at 06:30 JST. This GitHub Actions job is the web-side fallback.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: cnp-news-update
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check previous day news (JST)
        id: check
        run: |
          YDAY=$(TZ=Asia/Tokyo date -d 'yesterday' +%Y-%m-%d)
          echo "yday=$YDAY" >> "$GITHUB_OUTPUT"
          if python -c "import json, pathlib, sys; p=pathlib.Path('news.json'); news=json.load(p.open(encoding='utf-8')) if p.exists() else {}; sys.exit(0 if news.get('$YDAY') else 1)"
          then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Previous day news ($YDAY) already exists. Skip."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Previous day news ($YDAY) is missing. Fetch."
          fi

      - name: Install news dependencies
        if: steps.check.outputs.run == 'true'
        run: python -m pip install --upgrade pip twikit

      - name: Fetch news
        if: steps.check.outputs.run == 'true'
        env:
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
          PYTHONUNBUFFERED: "1"
        run: |
          python fetch_news.py
          python -c "import json, pathlib, sys; p=pathlib.Path('news.json'); news=json.load(p.open(encoding='utf-8')) if p.exists() else {}; sys.exit(0 if news.get('${{ steps.check.outputs.yday }}') else 1)"

      - name: Commit & push news
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "No news changes."
          else
            git commit -m "news: fallback update ($(date -u +%Y-%m-%dT%H:%MZ))"
            git pull --rebase --autostash origin main
            git push
          fi
