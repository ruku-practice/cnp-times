name: Daily CNP data update

on:
  schedule:
    # 00:00 JST = 15:00 UTC（GitHubのcronはUTC・混雑時は多少遅延することがあります）
    - cron: "0 15 * * *"
  workflow_dispatch: {}   # 手動実行（テスト用）

permissions:
  contents: write          # 生成したJSONをリポジトリへ push するため

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Write service account credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > service_account.json
          echo "wrote service_account.json ($(wc -c < service_account.json) bytes)"

      - name: Run scraper & build site data
        env:
          GOOGLE_CREDENTIALS_PATH: ${{ github.workspace }}/service_account.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          PYTHONUNBUFFERED: "1"
        run: python get_CNP_stats_integrated_json.py

      - name: Commit & push updated data
        run: |
          rm -f service_account.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add html2_data.json floorprice_data.json data/ snapshots/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "変更なし（push スキップ）"
          else
            git commit -m "chore: daily data update ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
